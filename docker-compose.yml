version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract_sentinel_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-contract_sentinel}
    # Do NOT expose ports to host in production - use internal network only
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: contract_sentinel_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_sentinel_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-contract_sentinel}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      APP_ENV: ${APP_ENV:-production}
      DEBUG: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: contract-sentinel-backend
    expose:
      - "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - contract_files:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contract_sentinel_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - frontend

  # ═══════════════════════════════════════════════
  # Observability Stack (Grafana + OTEL + Prom/Loki/Tempo)
  # ═══════════════════════════════════════════════

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: sentinel_otel_collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "8889"   # Prometheus exporter
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinel_prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    expose:
      - "9090"
    restart: unless-stopped
    depends_on:
      - otel-collector
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.4
    container_name: sentinel_loki
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"
    restart: unless-stopped
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.4.1
    container_name: sentinel_tempo
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    expose:
      - "3200"
      - "4317"
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.1
    container_name: sentinel_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sentinel123}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  contract_files:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
